<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chấm Công - Siêu Thanh Hà Nội</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:white;border-radius:18px;box-shadow:0 4px 28px rgba(0,0,0,.12);
  padding:28px 22px;max-width:420px;width:100%;}

.header{text-align:center;margin-bottom:20px;}
.header h1{color:#1a73e8;font-size:21px;font-weight:700;margin-top:6px;}
.header p{color:#777;font-size:13px;margin-top:3px;}

.clock-box{background:#f8f9fa;border-radius:12px;padding:12px;
  text-align:center;margin-bottom:18px;}
.clock-box .time{font-size:30px;font-weight:700;color:#202124;letter-spacing:2px;}
.clock-box .date{font-size:13px;color:#666;margin-top:3px;}

/* Email block */
.email-block{margin-bottom:14px;}
label{display:block;font-size:13px;color:#555;font-weight:600;margin-bottom:5px;}

/* Email đã lưu */
.email-saved{display:flex;align-items:center;justify-content:space-between;
  border:1.5px solid #1a73e8;border-radius:10px;padding:10px 14px;
  background:#e8f0fe;cursor:pointer;}
.email-saved .addr{font-size:15px;font-weight:600;color:#1a73e8;word-break:break-all;}
.email-saved .change{font-size:12px;color:#1a73e8;white-space:nowrap;
  margin-left:10px;text-decoration:underline;flex-shrink:0;}

/* Input email */
.email-input-wrap{display:flex;gap:8px;align-items:stretch;}
.email-input-wrap input{flex:1;border:1.5px solid #dadce0;border-radius:10px;
  padding:11px 13px;font-size:15px;outline:none;
  transition:border-color .2s;font-family:inherit;}
.email-input-wrap input:focus{border-color:#1a73e8;}
.btn-confirm-email{background:#1a73e8;color:white;border:none;border-radius:10px;
  padding:0 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-confirm-email:hover{background:#1557b0;}

.email-hint{font-size:12px;color:#888;margin-top:5px;}

textarea{width:100%;border:1.5px solid #dadce0;border-radius:10px;
  padding:10px 12px;font-size:14px;resize:none;outline:none;
  transition:border-color .2s;font-family:inherit;}
textarea:focus{border-color:#1a73e8;}
.field{margin-bottom:14px;}

/* Location */
.loc{border-radius:12px;padding:13px 15px;font-size:13px;
  display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.loc.idle {background:#f1f3f4;color:#555;}
.loc.ok   {background:#e6f4ea;color:#137333;}
.loc.warn {background:#fef7e0;color:#8a4f00;}
.loc.err  {background:#fce8e6;color:#c5221f;}
.loc .li{font-size:20px;flex-shrink:0;margin-top:1px;}
.loc .lb strong{display:block;font-size:14px;margin-bottom:2px;}
.loc .lb span{display:block;line-height:1.7;}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all .2s;margin-bottom:10px;}
.btn:last-child{margin-bottom:0;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.blue {background:#1a73e8;color:#fff;}
.blue:hover:not(:disabled){background:#1557b0;}
.green{background:#34a853;color:#fff;}
.green:hover:not(:disabled){background:#137333;}
.gray {background:#f1f3f4;color:#444;font-size:14px;font-weight:500;}
.gray:hover:not(:disabled){background:#e0e0e0;}

.spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Result */
#done{display:none;text-align:center;padding:8px 0;}
#done.show{display:block;}
.main.hide{display:none;}
.r-emoji{font-size:56px;margin-bottom:8px;}
.r-title{font-size:20px;font-weight:700;margin-bottom:14px;}
.rows{background:#f8f9fa;border-radius:12px;padding:14px 16px;
  text-align:left;margin-bottom:18px;}
.row{display:flex;justify-content:space-between;padding:7px 0;
  font-size:14px;border-bottom:1px solid #eee;}
.row:last-child{border-bottom:none;}
.row .l{color:#888;font-size:13px;flex-shrink:0;padding-right:8px;}
.row .v{font-weight:600;color:#202124;text-align:right;word-break:break-all;}
</style>
</head>
<body>
<div class="card">

  <!-- Màn hình chính -->
  <div class="main" id="main">
    <div class="header">
      <!--
        CÁCH 1 — Link ảnh trực tuyến:
        Thay LINK_LOGO_CUA_BAN bằng URL ảnh logo (Google Drive, imgur, v.v.)

        CÁCH 2 — Ảnh nhúng trực tiếp (Base64):
        Thay toàn bộ thẻ <img> bằng:
        <img src="data:image/png;base64,CHUỖI_BASE64" ...>
        (xem hướng dẫn bên dưới)
      -->
      <img
        src="https://github.com/hasttechnical2025-prog/hast_chamcong/blob/main/Sieu%20Thanh%20Logo.png"
        alt="Logo Siêu Thanh"
        style="height:64px;object-fit:contain;margin-bottom:8px;"
        onerror="this.style.display='none';document.getElementById('fallback-icon').style.display='block'">
      <div id="fallback-icon" style="font-size:42px;display:none">🏢</div>
      <h1>Chấm Công</h1>
      <p>Công ty CP Siêu Thanh Hà Nội</p>
    </div>

    <div class="clock-box">
      <div class="time" id="clock">--:--:--</div>
      <div class="date" id="date-d"></div>
    </div>

    <!-- Email block -->
    <div class="email-block" id="email-block">
      <label>📧 Email chấm công</label>
      <!-- Hiện email đã lưu -->
      <div id="email-saved-ui" style="display:none">
        <div class="email-saved" onclick="switchEmail()">
          <span class="addr" id="saved-addr"></span>
          <span class="change">Đổi email</span>
        </div>
        <div class="email-hint">Bấm vào email để thay đổi</div>
      </div>
      <!-- Nhập email mới -->
      <div id="email-input-ui">
        <div class="email-input-wrap">
          <input type="email" id="email-input"
            placeholder="ten@gmail.com"
            inputmode="email" autocomplete="email"
            onkeydown="if(event.key==='Enter')confirmEmail()">
          <button class="btn-confirm-email" onclick="confirmEmail()">Xác nhận</button>
        </div>
        <div class="email-hint">Nhập email → bấm Xác nhận để lưu cho lần sau</div>
      </div>
    </div>

    <!-- GPS -->
    <div class="loc idle" id="loc">
      <span class="li">📍</span>
      <div class="lb">
        <strong>Chưa lấy vị trí</strong>
        <span>Bấm nút bên dưới để lấy GPS</span>
      </div>
    </div>

    <!-- Ghi chú -->
    <div class="field">
      <label>📝 Ghi chú (tuỳ chọn)</label>
      <textarea id="note" rows="2" placeholder="Công tác, đi muộn, lý do khác..."></textarea>
    </div>

    <button class="btn blue" id="btn-gps" onclick="getGPS()">
      📡 Lấy vị trí GPS
    </button>
    <button class="btn green" id="btn-send" onclick="send()" style="display:none">
      ✅ Gửi chấm công
    </button>
    <button class="btn gray" id="btn-no-gps" onclick="sendNoGPS()" style="display:none">
      📤 Gửi không có GPS
    </button>
  </div>

  <!-- Màn hình kết quả -->
  <div id="done">
    <div class="r-emoji" id="r-emoji"></div>
    <div class="r-title" id="r-title"></div>
    <div class="rows"    id="r-rows"></div>
    <button class="btn green" onclick="resetForm()">🔄 Chấm công tiếp</button>
  </div>

</div>
<script>
// ═══════════════════════════════════════════
// ⚙️ CẤU HÌNH — SỬA 2 GIÁ TRỊ NÀY
// ═══════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/DEPLOYMENT_ID/exec';

const OFFICES = [
  { name: 'Văn phòng Siêu Thanh', lat: 21.0000, lng: 105.8412, radius: 200 },
];
// ═══════════════════════════════════════════

const STORAGE_KEY = 'chamcong_email';
const DAYS = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
let gpsCoords = null;

// ── Đồng hồ ──────────────────────────────────────────────
function tick(){
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('vi-VN', {hour12: false});
  document.getElementById('date-d').textContent =
    DAYS[n.getDay()] + ', ' + n.toLocaleDateString('vi-VN');
}
setInterval(tick, 1000); tick();

// ── Email — localStorage ──────────────────────────────────
function initEmail() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    showSavedEmail(saved);
  } else {
    showEmailInput();
  }
}

function showSavedEmail(email) {
  document.getElementById('saved-addr').textContent = email;
  document.getElementById('email-saved-ui').style.display = 'block';
  document.getElementById('email-input-ui').style.display = 'none';
}

function showEmailInput() {
  document.getElementById('email-saved-ui').style.display = 'none';
  document.getElementById('email-input-ui').style.display = 'block';
  // Điền sẵn email đã lưu vào input nếu có
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) document.getElementById('email-input').value = saved;
  setTimeout(() => document.getElementById('email-input').focus(), 100);
}

function confirmEmail() {
  const val = document.getElementById('email-input').value.trim();
  if (!val || !val.includes('@')) {
    alert('Vui lòng nhập email hợp lệ.');
    return;
  }
  localStorage.setItem(STORAGE_KEY, val);
  showSavedEmail(val);
}

function switchEmail() {
  showEmailInput();
  // Reset GPS khi đổi email
  gpsCoords = null;
  document.getElementById('btn-send').style.display = 'none';
  document.getElementById('btn-no-gps').style.display = 'none';
  document.getElementById('btn-gps').innerHTML = '📡 Lấy vị trí GPS';
  document.getElementById('btn-gps').disabled = false;
  setLoc('idle', '📍', 'Chưa lấy vị trí', ['Bấm nút bên dưới để bắt đầu']);
}

function getEmail() {
  return localStorage.getItem(STORAGE_KEY) || '';
}

// ── GPS ───────────────────────────────────────────────────
function haversine(a,b,c,d){
  const R=6371000, r=x=>x*Math.PI/180, da=r(c-a), db=r(d-b);
  const e=Math.sin(da/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(db/2)**2;
  return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));
}
function checkOffice(lat,lng){
  let best=null, min=Infinity;
  OFFICES.forEach(o=>{
    const d=haversine(lat,lng,o.lat,o.lng);
    if(d<min){min=d;best=o;}
  });
  return {office:best, dist:min, inside:best&&min<=best.radius};
}
function setLoc(type, icon, title, lines){
  const el = document.getElementById('loc');
  el.className = 'loc ' + type;
  el.innerHTML = `<span class="li">${icon}</span>
    <div class="lb"><strong>${title}</strong>${lines.map(l=>`<span>${l}</span>`).join('')}</div>`;
}

function getGPS(){
  // Kiểm tra email trước
  const email = getEmail();
  if (!email) {
    // Nếu đang trong input-ui thì nhắc confirm trước
    const inputVal = document.getElementById('email-input').value.trim();
    if (inputVal && inputVal.includes('@')) {
      confirmEmail(); // tự confirm nếu đã nhập
    } else {
      alert('Vui lòng nhập và xác nhận email trước.');
      document.getElementById('email-input').focus();
      return;
    }
  }

  const btn = document.getElementById('btn-gps');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Đang lấy GPS...';
  document.getElementById('btn-send').style.display = 'none';
  document.getElementById('btn-no-gps').style.display = 'none';
  setLoc('idle','📡','Đang lấy vị trí...','Nếu trình duyệt hỏi quyền → bấm Cho phép'.split('|'));

  navigator.geolocation.getCurrentPosition(
    pos => {
      gpsCoords = pos.coords;
      const {latitude:lat, longitude:lng, accuracy:acc} = pos.coords;
      const {office, dist, inside} = checkOffice(lat, lng);
      btn.disabled = false;
      btn.innerHTML = '🔄 Lấy lại GPS';
      if (inside) {
        setLoc('ok','✅',`Trong phạm vi: ${office.name}`,[
          `📏 Khoảng cách: ${Math.round(dist)} m`,
          `🎯 Độ chính xác: ±${Math.round(acc)} m`]);
      } else {
        setLoc('warn','⚠️','Ngoài phạm vi văn phòng',[
          `📏 Cách ${office?office.name:'VP'}: ${Math.round(dist)} m`,
          `🎯 Độ chính xác: ±${Math.round(acc)} m`,
          'Vẫn có thể gửi — sẽ được ghi nhận.']);
      }
      document.getElementById('btn-send').style.display = 'flex';
    },
    err => {
      gpsCoords = null;
      btn.disabled = false;
      btn.innerHTML = '🔄 Thử lại GPS';
      const m = {
        1: 'Bạn từ chối GPS. Vào Cài đặt → Chrome → Vị trí → Cho phép.',
        2: 'Không bắt được tín hiệu. Ra chỗ thoáng thử lại.',
        3: 'Hết thời gian. Thử lại.'
      };
      setLoc('err','❌','Không lấy được vị trí',[m[err.code]||'Lỗi GPS.']);
      document.getElementById('btn-no-gps').style.display = 'flex';
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0}
  );
}

// ── Gửi ──────────────────────────────────────────────────
function send(){
  if (!gpsCoords) { alert('Chưa có GPS.'); return; }
  doSend(gpsCoords.latitude, gpsCoords.longitude, gpsCoords.accuracy);
}
function sendNoGPS(){
  if (!confirm('Gửi chấm công không có GPS?')) return;
  doSend(null, null, null);
}

function doSend(lat, lng, accuracy){
  const email = getEmail();
  if (!email) { alert('Vui lòng nhập email.'); return; }

  ['btn-send','btn-no-gps','btn-gps'].forEach(id =>
    document.getElementById(id).disabled = true);
  document.getElementById('btn-send').innerHTML =
    '<span class="spin"></span> Đang gửi...';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
      email, lat, lng, accuracy,
      note: document.getElementById('note').value.trim()
    })
  })
  .then(r => r.json())
  .then(r => {
    ['btn-send','btn-no-gps','btn-gps'].forEach(id =>
      document.getElementById(id).disabled = false);
    document.getElementById('btn-send').innerHTML = '✅ Gửi chấm công';
    showDone(r, email);
  })
  .catch(e => {
    ['btn-send','btn-no-gps','btn-gps'].forEach(id =>
      document.getElementById(id).disabled = false);
    document.getElementById('btn-send').innerHTML = '✅ Gửi chấm công';
    alert('Lỗi kết nối: ' + e.message);
  });
}

// ── Kết quả ──────────────────────────────────────────────
function showDone(r, email){
  document.getElementById('main').classList.add('hide');
  document.getElementById('done').classList.add('show');
  if (r.success){
    document.getElementById('r-emoji').textContent = r.isAllowed ? '✅' : '⚠️';
    document.getElementById('r-title').textContent = 'Chấm công thành công!';
    document.getElementById('r-rows').innerHTML = `
      <div class="row"><span class="l">🕐 Thời gian</span><span class="v">${r.time}</span></div>
      <div class="row"><span class="l">📧 Email</span><span class="v">${email}</span></div>
      <div class="row"><span class="l">📍 Địa điểm</span><span class="v">${r.location}</span></div>
      ${r.distance!=null?`<div class="row"><span class="l">📏 Khoảng cách</span><span class="v">${r.distance} m</span></div>`:''}
      <div class="row"><span class="l">✔ Trạng thái</span>
        <span class="v">${r.isAllowed?'✅ Hợp lệ':'⚠️ Ngoài phạm vi'}</span></div>`;
  } else {
    document.getElementById('r-emoji').textContent = '❌';
    document.getElementById('r-title').textContent = 'Có lỗi xảy ra';
    document.getElementById('r-rows').innerHTML =
      `<div class="row"><span class="v" style="color:#c5221f">${r.error}</span></div>`;
  }
}

function resetForm(){
  gpsCoords = null;
  document.getElementById('done').classList.remove('show');
  document.getElementById('main').classList.remove('hide');
  document.getElementById('note').value = '';
  document.getElementById('btn-send').style.display = 'none';
  document.getElementById('btn-no-gps').style.display = 'none';
  document.getElementById('btn-gps').innerHTML = '📡 Lấy vị trí GPS';
  document.getElementById('btn-gps').disabled = false;
  setLoc('idle','📍','Chưa lấy vị trí',['Bấm nút bên dưới để bắt đầu']);
}

// Khởi động
initEmail();
</script>
</body>
</html>
