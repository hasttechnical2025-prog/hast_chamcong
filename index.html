<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:white;border-radius:18px;box-shadow:0 4px 28px rgba(0,0,0,.12);
  padding:28px 22px;max-width:420px;width:100%;}

.header{text-align:center;margin-bottom:20px;}
.header h1{color:#1a73e8;font-size:21px;font-weight:700;margin-top:6px;}
.header p{color:#777;font-size:13px;margin-top:3px;}

.clock-box{background:#f8f9fa;border-radius:12px;padding:12px;
  text-align:center;margin-bottom:18px;}
.clock-box .time{font-size:30px;font-weight:700;color:#202124;letter-spacing:2px;}
.clock-box .date{font-size:13px;color:#666;margin-top:3px;}

/* Email block */
.email-block{margin-bottom:14px;}
label{display:block;font-size:13px;color:#555;font-weight:600;margin-bottom:5px;}

/* Email đã lưu */
.email-saved{display:flex;align-items:center;justify-content:space-between;
  border:1.5px solid #1a73e8;border-radius:10px;padding:10px 14px;
  background:#e8f0fe;cursor:pointer;}
.email-saved .addr{font-size:15px;font-weight:600;color:#1a73e8;word-break:break-all;}

/* Input email */
.email-input-wrap{display:flex;gap:8px;align-items:stretch;}
.email-input-wrap input{flex:1;border:1.5px solid #dadce0;border-radius:10px;
  padding:11px 13px;font-size:15px;outline:none;
  transition:border-color .2s;font-family:inherit;}
.email-input-wrap input:focus{border-color:#1a73e8;}
.btn-confirm-email{background:#1a73e8;color:white;border:none;border-radius:10px;
  padding:0 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-confirm-email:hover{background:#1557b0;}

.email-hint{font-size:12px;color:#888;margin-top:5px;}

textarea{width:100%;border:1.5px solid #dadce0;border-radius:10px;
  padding:10px 12px;font-size:14px;resize:none;outline:none;
  transition:border-color .2s;font-family:inherit;}
textarea:focus{border-color:#1a73e8;}
.field{margin-bottom:14px;}

/* Location */
.loc{border-radius:12px;padding:13px 15px;font-size:13px;
  display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.loc.idle {background:#f1f3f4;color:#555;}
.loc.ok   {background:#e6f4ea;color:#137333;}
.loc.warn {background:#fef7e0;color:#8a4f00;}
.loc.err  {background:#fce8e6;color:#c5221f;}
.loc .li{font-size:20px;flex-shrink:0;margin-top:1px;}
.loc .lb strong{display:block;font-size:14px;margin-bottom:2px;}
.loc .lb span{display:block;line-height:1.7;}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all .2s;margin-bottom:10px;}
.btn:last-child{margin-bottom:0;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.blue {background:#1a73e8;color:#fff;}
.blue:hover:not(:disabled){background:#1557b0;}
.green{background:#34a853;color:#fff;}
.green:hover:not(:disabled){background:#137333;}
.gray {background:#f1f3f4;color:#444;font-size:14px;font-weight:500;}
.gray:hover:not(:disabled){background:#e0e0e0;}

.spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Custom popup */
#popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:999;align-items:center;justify-content:center;padding:24px;}
#popup-overlay.show{display:flex;}
.popup-box{background:white;border-radius:16px;padding:24px 22px;
  max-width:300px;width:100%;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.18);animation:pop .2s ease;}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.popup-title{font-size:15px;font-weight:700;color:#1a73e8;margin-bottom:10px;}
.popup-msg{font-size:14px;color:#333;line-height:1.6;margin-bottom:18px;}
.popup-btn{background:#1a73e8;color:white;border:none;border-radius:10px;
  padding:11px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
.popup-btn:hover{background:#1557b0;}

/* Result */
#done{display:none;text-align:center;padding:8px 0;}
#done.show{display:block;}
.main.hide{display:none;}
.r-emoji{font-size:56px;margin-bottom:8px;}
.r-title{font-size:20px;font-weight:700;margin-bottom:14px;}
.rows{background:#f8f9fa;border-radius:12px;padding:14px 16px;
  text-align:left;margin-bottom:18px;}
.row{display:flex;justify-content:space-between;padding:7px 0;
  font-size:14px;border-bottom:1px solid #eee;}
.row:last-child{border-bottom:none;}
.row .l{color:#888;font-size:13px;flex-shrink:0;padding-right:8px;}
.row .v{font-weight:600;color:#202124;text-align:right;word-break:break-all;}
</style>
</head>

<script>
// ═══════════════════════════════════════════
// ⚙️ CẤU HÌNH — SỬA 2 GIÁ TRỊ NÀY
// ═══════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNZYP-0_8NkYgyH0p7yFcb91uTdmRsgEKtb3Amg75c-Mv6pPKoYzFiKV-UmupcBPaF/exec';

const OFFICES = [
  { name: 'Văn phòng Siêu Thanh', lat: 21.009109, lng: 105.813355, radius: 200 },
];

// Khoảng cách tối đa cho phép chấm công (mét). Vượt quá sẽ bị chặn hoàn toàn.
// Ví dụ: 10000 = 10 km. Đặt 0 để tắt giới hạn này.
const MAX_DISTANCE = 10000;

// Dùng OpenStreetMap Nominatim — miễn phí, không cần API key
// ═══════════════════════════════════════════

const DAYS = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
let gpsCoords = null;

// ── Đồng hồ ──────────────────────────────────────────────
function tick(){
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const ss = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss;
  document.getElementById('date-d').textContent =
    DAYS[n.getDay()] + ', ' + n.getDate() + '/' + (n.getMonth()+1) + '/' + n.getFullYear();
}
// Chạy sau khi DOM load xong
window.onload = function() {
  tick();
  setInterval(tick, 1000);
};

// ── Tên nhân viên từ URL parameter ───────────────────────
var employeeName = '';

function initEmail() {
  var params = new URLSearchParams(window.location.search);
  var nameFromUrl = params.get('name') || '';
  nameFromUrl = decodeURIComponent(nameFromUrl).trim();

  if (nameFromUrl) {
    employeeName = nameFromUrl;
    document.getElementById('name-display').textContent = nameFromUrl;
    document.getElementById('name-hint').textContent = '';
  } else {
    employeeName = '';
    document.getElementById('name-display').textContent = '⚠️ Link không hợp lệ';
    document.getElementById('name-hint').textContent = 'Vui lòng dùng đúng link được cấp';
    document.getElementById('name-display').style.color = '#c5221f';
    document.getElementById('btn-gps').disabled = true;
  }
}

function getEmail() {
  return employeeName;
}

// ── Custom popup (thay alert) ─────────────────────────────
function showPopup(msg, title) {
  document.getElementById('popup-title').textContent = title || 'HAST Chấm công';
  document.getElementById('popup-msg').textContent   = msg;
  document.getElementById('popup-overlay').classList.add('show');
}
function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
}



// ── GPS ───────────────────────────────────────────────────
function haversine(a,b,c,d){
  const R=6371000, r=x=>x*Math.PI/180, da=r(c-a), db=r(d-b);
  const e=Math.sin(da/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(db/2)**2;
  return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));
}
function checkOffice(lat,lng){
  let best=null, min=Infinity;
  OFFICES.forEach(o=>{
    const d=haversine(lat,lng,o.lat,o.lng);
    if(d<min){min=d;best=o;}
  });
  return {office:best, dist:min, inside:best&&min<=best.radius};
}
function setLoc(type, icon, title, lines){
  var el = document.getElementById('loc');
  el.className = 'loc ' + type;
  var spans = '';
  for (var i = 0; i < lines.length; i++) {
    spans += '<span>' + lines[i] + '</span>';
  }
  el.innerHTML = '<span class="li">' + icon + '</span>'
    + '<div class="lb"><strong>' + title + '</strong>' + spans + '</div>';
}

function getGPS(){
  const email = getEmail();
  if (!email) {
    showPopup('Vui lòng nhập và xác nhận họ tên trước.');
    return;
  }

  const btn = document.getElementById('btn-gps');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Đang lấy GPS...';
  document.getElementById('btn-send').style.display = 'none';
  setLoc('idle','📡','Đang lấy vị trí...','Nếu trình duyệt hỏi quyền → bấm Cho phép'.split('|'));

  navigator.geolocation.getCurrentPosition(
    async pos => {
      // Copy ra plain object để có thể gán thêm .address
      gpsCoords = {
        latitude:  pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy:  pos.coords.accuracy
      };
      const lat = gpsCoords.latitude;
      const lng = gpsCoords.longitude;
      const acc = gpsCoords.accuracy;
      const {office, dist, inside} = checkOffice(lat, lng);
      btn.disabled = false;
      btn.innerHTML = '🔄 Lấy lại GPS';

      // Kiểm tra vượt quá khoảng cách tối đa
      const overMax = MAX_DISTANCE > 0 && dist > MAX_DISTANCE;
      const distKm  = (dist / 1000).toFixed(1);
      const maxKm   = (MAX_DISTANCE / 1000).toFixed(0);
      if (overMax) {
        setLoc('err','🚫','Không thể chấm công',[
          `📏 Bạn đang cách văn phòng <b>${distKm} km</b>`,
          `⛔ Giới hạn cho phép: ${maxKm} km`,
          'Vui lòng đến gần văn phòng hơn để chấm công.'
        ]);
      } else if (inside) {
        setLoc('ok','✅',`Trong phạm vi: ${office.name}`,[
          `📏 Khoảng cách: ${Math.round(dist)} m`,
          `🎯 Độ chính xác: ±${Math.round(acc)} m`
        ]);
        document.getElementById('btn-send').style.display = 'flex';
      } else {
        setLoc('warn','⚠️','Ngoài phạm vi văn phòng',[
          `📏 Cách ${office?office.name:'VP'}: ${Math.round(dist)} m`,
          `🎯 Độ chính xác: ±${Math.round(acc)} m`,
          'Vẫn có thể gửi — sẽ được ghi nhận.'
        ]);
        document.getElementById('btn-send').style.display = 'flex';
      }
    },
    err => {
      gpsCoords = null;
      btn.disabled = false;
      btn.innerHTML = '🔄 Thử lại GPS';
      const m = {
        1: 'Bạn đã từ chối quyền GPS. Vào Cài đặt → Chrome → Vị trí → Cho phép rồi thử lại.',
        2: 'Không bắt được tín hiệu GPS. Ra chỗ thoáng hoặc bật Wi-Fi rồi thử lại.',
        3: 'Hết thời gian chờ GPS. Kiểm tra kết nối rồi thử lại.'
      };
      setLoc('err','❌','Không lấy được vị trí — Không thể chấm công',[
        m[err.code]||'Lỗi GPS không xác định.',
        '⛔ Bắt buộc phải có GPS để chấm công.'
      ]);
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0}
  );
}

// ── Gửi ──────────────────────────────────────────────────
function send(){
  if (!gpsCoords) { showPopup('Chưa có GPS. Vui lòng lấy vị trí trước.'); return; }
  doSend(gpsCoords.latitude, gpsCoords.longitude, gpsCoords.accuracy);
}


function doSend(lat, lng, accuracy){
  var email = getEmail();
  if (!email) { showPopup('Vui lòng nhập họ tên.'); return; }

  var btnSend = document.getElementById('btn-send');
  var btnGps  = document.getElementById('btn-gps');
  btnSend.disabled = true;
  btnGps.disabled  = true;
  btnSend.innerHTML = '<span class="spin"></span> Đang gửi...';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
      email: email,
      lat: lat,
      lng: lng,
      accuracy: accuracy,
      note: document.getElementById('note').value.trim()
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(r){
    btnSend.disabled = false;
    btnGps.disabled  = false;
    btnSend.innerHTML = '✅ Gửi chấm công';
    showDone(r, email);
  })
  .catch(function(e){
    btnSend.disabled = false;
    btnGps.disabled  = false;
    btnSend.innerHTML = '✅ Gửi chấm công';
    showPopup('Lỗi kết nối: ' + e.message, 'Có lỗi xảy ra');
  });
}

// ── Kết quả ──────────────────────────────────────────────
function showDone(r, email){
  document.getElementById('main').classList.add('hide');
  document.getElementById('done').classList.add('show');
  if (r.success){
    document.getElementById('r-emoji').textContent = r.isAllowed ? '✅' : '⚠️';
    document.getElementById('r-title').textContent = 'Chấm công thành công!';
    document.getElementById('r-rows').innerHTML = `
      <div class="row"><span class="l">🕐 Thời gian</span><span class="v">${r.time}</span></div>
      <div class="row"><span class="l">👤 Họ tên</span><span class="v">${email}</span></div>
      <div class="row"><span class="l">📍 Địa điểm</span><span class="v">${r.location}</span></div>
      ${r.distance!=null?`<div class="row"><span class="l">📏 Khoảng cách</span><span class="v">${r.distance} m</span></div>`:''}
      ${r.address?`<div class="row"><span class="l">🗺 Địa chỉ</span><span class="v">${r.address}</span></div>`:''}
      <div class="row"><span class="l">✔ Trạng thái</span>
        <span class="v">${r.isAllowed?'✅ Hợp lệ':'⚠️ Ngoài phạm vi'}</span></div>`;
  } else {
    document.getElementById('r-emoji').textContent = '❌';
    document.getElementById('r-title').textContent = 'Có lỗi xảy ra';
    document.getElementById('r-rows').innerHTML =
      `<div class="row"><span class="v" style="color:#c5221f">${r.error}</span></div>`;
  }
}

function resetForm(){
  gpsCoords = null;
  document.getElementById('done').classList.remove('show');
  document.getElementById('main').classList.remove('hide');
  document.getElementById('note').value = '';
  document.getElementById('btn-send').style.display = 'none';
  document.getElementById('btn-gps').innerHTML = '📡 Lấy vị trí GPS';
  document.getElementById('btn-gps').disabled = false;
  setLoc('idle','📍','Chưa lấy vị trí',['Bấm nút bên dưới để bắt đầu']);

}

// Khởi động
initEmail();
</script>
