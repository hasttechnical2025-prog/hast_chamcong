<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:white;border-radius:18px;box-shadow:0 4px 28px rgba(0,0,0,.12);
  padding:28px 22px;max-width:420px;width:100%;}

.header{text-align:center;margin-bottom:20px;}
.header h1{color:#1a73e8;font-size:21px;font-weight:700;margin-top:6px;}
.header p{color:#777;font-size:13px;margin-top:3px;}

.clock-box{background:#f8f9fa;border-radius:12px;padding:12px;
  text-align:center;margin-bottom:18px;}
.clock-box .time{font-size:30px;font-weight:700;color:#202124;letter-spacing:2px;}
.clock-box .date{font-size:13px;color:#666;margin-top:3px;}

/* Email block */
.email-block{margin-bottom:14px;}
label{display:block;font-size:13px;color:#555;font-weight:600;margin-bottom:5px;}

/* Email đã lưu */
.email-saved{display:flex;align-items:center;justify-content:space-between;
  border:1.5px solid #1a73e8;border-radius:10px;padding:10px 14px;
  background:#e8f0fe;cursor:pointer;}
.email-saved .addr{font-size:15px;font-weight:600;color:#1a73e8;word-break:break-all;}

/* Input email */
.email-input-wrap{display:flex;gap:8px;align-items:stretch;}
.email-input-wrap input{flex:1;border:1.5px solid #dadce0;border-radius:10px;
  padding:11px 13px;font-size:15px;outline:none;
  transition:border-color .2s;font-family:inherit;}
.email-input-wrap input:focus{border-color:#1a73e8;}
.btn-confirm-email{background:#1a73e8;color:white;border:none;border-radius:10px;
  padding:0 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-confirm-email:hover{background:#1557b0;}

.email-hint{font-size:12px;color:#888;margin-top:5px;}

textarea{width:100%;border:1.5px solid #dadce0;border-radius:10px;
  padding:10px 12px;font-size:14px;resize:none;outline:none;
  transition:border-color .2s;font-family:inherit;}
textarea:focus{border-color:#1a73e8;}
.field{margin-bottom:14px;}

/* Location */
.loc{border-radius:12px;padding:13px 15px;font-size:13px;
  display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.loc.idle {background:#f1f3f4;color:#555;}
.loc.ok   {background:#e6f4ea;color:#137333;}
.loc.warn {background:#fef7e0;color:#8a4f00;}
.loc.err  {background:#fce8e6;color:#c5221f;}
.loc .li{font-size:20px;flex-shrink:0;margin-top:1px;}
.loc .lb strong{display:block;font-size:14px;margin-bottom:2px;}
.loc .lb span{display:block;line-height:1.7;}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all .2s;margin-bottom:10px;}
.btn:last-child{margin-bottom:0;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.blue {background:#1a73e8;color:#fff;}
.blue:hover:not(:disabled){background:#1557b0;}
.green{background:#34a853;color:#fff;}
.green:hover:not(:disabled){background:#137333;}
.gray {background:#f1f3f4;color:#444;font-size:14px;font-weight:500;}
.gray:hover:not(:disabled){background:#e0e0e0;}

.spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Custom popup */
#popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:999;align-items:center;justify-content:center;padding:24px;}
#popup-overlay.show{display:flex;}
.popup-box{background:white;border-radius:16px;padding:24px 22px;
  max-width:300px;width:100%;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.18);animation:pop .2s ease;}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.popup-title{font-size:15px;font-weight:700;color:#1a73e8;margin-bottom:10px;}
.popup-msg{font-size:14px;color:#333;line-height:1.6;margin-bottom:18px;}
.popup-btn{background:#1a73e8;color:white;border:none;border-radius:10px;
  padding:11px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
.popup-btn:hover{background:#1557b0;}

/* History screen */
#history{display:none;padding:4px 0;}
#history.show{display:block;}
.hist-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:8px;flex-wrap:wrap;}
.hist-header h2{font-size:16px;font-weight:700;color:#1a73e8;margin:0;}
/* month-nav removed */
.hist-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.hist-stat{background:#f8f9fa;border-radius:10px;padding:10px;text-align:center;}
.hist-stat .val{font-size:20px;font-weight:700;color:#1a73e8;}
.hist-stat .lbl{font-size:11px;color:#888;margin-top:2px;}
.hist-table{width:100%;border-collapse:collapse;font-size:12px;}
.hist-table th{background:#1a73e8;color:white;padding:7px 4px;text-align:center;
  position:sticky;top:0;font-size:11px;}
.hist-table td{padding:6px 4px;text-align:center;border-bottom:1px solid #f0f0f0;font-size:12px;}
.hist-table td:nth-child(1){min-width:86px;font-weight:600;}
.hist-table td:nth-child(2){color:#888;font-size:11px;white-space:nowrap;}
.hist-table td:last-child{text-align:left;font-size:12px;color:#555;min-width:86px;max-width:100px;word-break:break-word;}
.hist-table th:last-child{min-width:86px;}
.hist-table tr.weekend td{background:#f5f5f5 !important;color:#bbb;}
.hist-table tr.weekend td:nth-child(1){color:#aaa;}
.hist-table tr.weekend td:nth-child(2){color:#e0e0e0;font-weight:700;}
.hist-table tr.no-reason td:last-child{color:transparent;}
.hist-table tr.all-ok td{background:#f0fdf4;}
.hist-table tr.absent td{background:#fef2f2;}
.hist-table tr.partial td{background:#fefce8;}
.grade-a{color:#137333;font-weight:700;}
.grade-b{color:#b45309;font-weight:700;}
.grade-d{color:#c5221f;font-weight:700;}
.hist-loading{text-align:center;padding:30px;color:#888;font-size:14px;}
.hist-scroll{overflow-x:auto;border-radius:10px;border:1px solid #eee;}

/* Result */
/* Result */
#done{display:none;text-align:center;padding:8px 0;}
#done.show{display:block;}
.main.hide{display:none;}
.r-emoji{font-size:56px;margin-bottom:8px;}
.r-title{font-size:20px;font-weight:700;margin-bottom:14px;}
.rows{background:#f8f9fa;border-radius:12px;padding:14px 16px;
  text-align:left;margin-bottom:18px;}
.row{display:flex;justify-content:space-between;padding:7px 0;
  font-size:14px;border-bottom:1px solid #eee;}
.row:last-child{border-bottom:none;}
.row .l{color:#888;font-size:13px;flex-shrink:0;padding-right:8px;}
.row .v{font-weight:600;color:#202124;text-align:right;word-break:break-all;}

.hist-table tr.holiday td{background:#e8f5e9 !important;}
.hist-table tr.holiday td:nth-child(1){color:#2e7d32;font-weight:600;}
.hist-table tr.holiday td:nth-child(2){color:#2e7d32;font-weight:700;}
.hist-table tr.holiday td:last-child{color:#2e7d32;font-style:italic;font-weight:600;}
.help-btn{display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;background:#e8e8e8;color:#999;
  font-size:12px;font-weight:700;text-decoration:none;margin-left:6px;
  vertical-align:middle;transition:all .2s;border:1px solid #ddd;cursor:pointer;}
.help-btn:hover{background:#1a73e8;color:white;border-color:#1a73e8;}
.guide-btn{display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:10px;background:#f1f3f4;color:#666;
  font-size:11px;font-weight:600;text-decoration:none;margin-left:6px;
  vertical-align:middle;transition:all .2s;border:1px solid #e0e0e0;}
.guide-btn:hover{background:#1a73e8;color:white;border-color:#1a73e8;}
.footer-row{display:flex;align-items:center;justify-content:center;
  gap:4px;flex-wrap:wrap;}
</style>
</head>

function tick(){
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const ss = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss;
  document.getElementById('date-d').textContent =
    DAYS[n.getDay()] + ', ' + n.getDate() + '/' + (n.getMonth()+1) + '/' + n.getFullYear();
}
// Chạy sau khi DOM load xong
window.onload = function() {
  tick();
  setInterval(tick, 1000);
};

// ── GPS ───────────────────────────────────────────────────
function haversine(a,b,c,d){
  const R=6371000, r=x=>x*Math.PI/180, da=r(c-a), db=r(d-b);
  const e=Math.sin(da/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(db/2)**2;
  return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));
}
function checkOffice(lat,lng){
  let best=null, min=Infinity;
  OFFICES.forEach(o=>{
    const d=haversine(lat,lng,o.lat,o.lng);
    if(d<min){min=d;best=o;}
  });
  return {office:best, dist:min, inside:best&&min<=best.radius};
}
function setLoc(type, icon, title, lines){
  var el = document.getElementById('loc');
  el.className = 'loc ' + type;
  var spans = '';
  for (var i = 0; i < lines.length; i++) {
    spans += '<span>' + lines[i] + '</span>';
  }
  el.innerHTML = '<span class="li">' + icon + '</span>'
    + '<div class="lb"><strong>' + title + '</strong>' + spans + '</div>';
}

function getGPS(){
  const email = getEmail();
  if (!email) {
    showPopup('Vui lòng nhập và xác nhận họ tên trước.');
    return;
  }

  const btn = document.getElementById('btn-gps');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Đang xác định vị trí...';
  document.getElementById('btn-send').style.display = 'none';
  setLoc('idle','📡','Đang xác định vị trí...','Nếu trình duyệt hỏi quyền → bấm Cho phép'.split('|'));

  navigator.geolocation.getCurrentPosition(
    async pos => {
      // Copy ra plain object để có thể gán thêm .address
      gpsCoords = {
        latitude:  pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy:  pos.coords.accuracy
      };
      gpsTimestamp = Date.now(); // lưu thời điểm lấy GPS
      gpsTimestamp = Date.now(); // lưu thời điểm lấy GPS
      const lat = gpsCoords.latitude;
      const lng = gpsCoords.longitude;
      const acc = gpsCoords.accuracy;
      const {office, dist, inside} = checkOffice(lat, lng);
      btn.disabled = false;
      btn.innerHTML = '🔄 Xác định lại vị trí';

      // Kiểm tra vượt quá khoảng cách tối đa
      const overMax = MAX_DISTANCE > 0 && dist > MAX_DISTANCE;
      const distKm  = (dist / 1000).toFixed(1);
      const maxKm   = (MAX_DISTANCE / 1000).toFixed(1);; //(MAX_DISTANCE / 1000).toFixed(0);
      if (overMax) {
        setLoc('err','🚫','Không thể chấm công',[
          `📏 Bạn đang cách Công ty <b>${distKm} km</b>`,
          `⛔ Giới hạn cho phép: ${maxKm} km`,
          '👉 Vui lòng đến gần Công ty hơn để chấm công.'
        ]);
      } else if (inside) {
        setLoc('ok','✅',`Trong phạm vi: ${office.name}`,[
          `📏 Khoảng cách: ${Math.round(dist)} m`,
          `🎯 Độ chính xác: ±${Math.round(acc)} m`
        ]);
        
        document.getElementById('btn-send').style.display = 'flex';
      } else {
        setLoc('warn','⚠️','Ngoài phạm vi Công ty',[
          `📏 Cách ${office?office.name:'VP'}: ${Math.round(dist)} m`,
          `🎯 Độ chính xác: ±${Math.round(acc)} m`,
          '🙅‍♀️ Dữ liệu chấm công vẫn được ghi nhận. Lưu ý vị trí lần chấm công tiếp theo!'
        ]);
        //document.getElementById('btn-gps').style.display = 'none'; - ẩn nút chấm công
        document.getElementById('btn-send').style.display = 'flex';
      }
    },
    err => {
      gpsCoords = null;
      btn.style.display = 'flex';
      btn.disabled = false;
      btn.innerHTML = '🔄 Thử lại GPS';
      const m = {
        1: 'Bạn đã từ chối quyền Chia sẻ vị trí. Vào Cài đặt → Vị trí → Cho phép rồi thử lại.',
        2: 'Không bắt được tín hiệu GPS. Ra chỗ thoáng hoặc bật Wi-Fi rồi thử lại.',
        3: 'Hết thời gian chờ GPS. Kiểm tra kết nối rồi thử lại.'
      };
      setLoc('err','❌','Không lấy được vị trí — Không thể chấm công',[
        m[err.code]||'Lỗi GPS không xác định.',
        '⛔ Bắt buộc phải có GPS để chấm công.'
      ]);
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0}
  );
}

// ── Gửi ──────────────────────────────────────────────────
function send() {
  if (!gpsCoords) {
    showPopup('Chưa có GPS. Vui lòng xác định vị trí trước.');
    return;
  }
  // Kiểm tra GPS có bị hết hạn không
  if (Date.now() - gpsTimestamp > GPS_EXPIRE_MS) {
    gpsCoords = null;
    gpsTimestamp = 0;
    document.getElementById('btn-send').style.display = 'none';
    setLoc('warn','⏱️','Vị trí đã hết hạn',[
      'GPS lấy quá 3 phút trước.',
      'Đang tự động xác định lại...'
    ]);
    getGPS(); // tự động lấy lại
    return;
  }
  doSend(gpsCoords.latitude, gpsCoords.longitude, gpsCoords.accuracy);
}

function doSend(lat, lng, accuracy){
  var email = getEmail();
  if (!email) { showPopup('Vui lòng nhập họ tên.'); return; }

  var btnSend = document.getElementById('btn-send');
  var btnGps  = document.getElementById('btn-gps');
  btnSend.disabled = true;
  btnGps.disabled  = true;
  btnSend.innerHTML = '<span class="spin"></span> Đang gửi thông tin...';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
      email: email,
      lat: lat,
      lng: lng,
      accuracy: accuracy,
      note: document.getElementById('note').value.trim()
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(r){
    btnSend.disabled = false;
    btnGps.disabled  = false;
    btnSend.innerHTML = '✅ Chấm công';
    showDone(r, email);
  })
  .catch(function(e){
    btnSend.disabled = false;
    btnGps.disabled  = false;
    btnSend.innerHTML = '✅ Chấm công';
    showPopup('Lỗi kết nối: ' + e.message, 'Có lỗi xảy ra');
  });
}

// ── Lịch sử chấm công cá nhân ────────────────────────────────────────
var histMonth = 0, histYear = 0;
var _historyCalledFrom = 'done';

function showHistory(from) {
  var name = getEmail();
  if (!name) { showPopup('Vui lòng xác nhận họ tên trước.'); return; }

  _historyCalledFrom = from || 'done';

  var now = new Date();
  if (!histMonth) { histMonth = now.getMonth()+1; histYear = now.getFullYear(); }

  // Ẩn màn hình hiện tại, hiện history
  document.getElementById('done').classList.remove('show');
  document.getElementById('main').classList.add('hide');
  document.getElementById('history').style.display = 'block';

  loadHistory(name);
}

var _historyCalledFrom = 'done'; // 'main' hoặc 'done'

function showMain() {
  document.getElementById('history').style.display = 'none';
  if (_historyCalledFrom === 'main') {
    document.getElementById('main').classList.remove('hide');
    document.getElementById('done').classList.remove('show');
  } else {
    document.getElementById('done').classList.add('show');
    document.getElementById('main').classList.add('hide');
  }
}

function changeMonth(delta) {
  histMonth += delta;
  if (histMonth > 12) { histMonth = 1;  histYear++; }
  if (histMonth < 1)  { histMonth = 12; histYear--; }
  loadHistory(getEmail());
}

function loadHistory(name) {
  var label = 'Tháng ' + histMonth + '/' + histYear;
  document.getElementById('hist-month-label').textContent = label;
  document.getElementById('hist-content').innerHTML =
    '<div class="hist-loading">⏳ Đang tải dữ liệu...</div>';
  document.getElementById('hist-summary').innerHTML = '';

  var url = APPS_SCRIPT_URL
    + '?action=history'
    + '&name=' + encodeURIComponent(name);

  fetch(url)
    .then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text){
      var data;
      try { data = JSON.parse(text); }
      catch(e) {
        document.getElementById('hist-content').innerHTML =
          '<div class="hist-loading" style="color:#c5221f;">❌ Phản hồi không hợp lệ: ' + text.substring(0,100) + '</div>';
        return;
      }
      if (!data.success) {
        document.getElementById('hist-content').innerHTML =
          '<div class="hist-loading" style="color:#c5221f;">❌ ' + (data.error||'Lỗi không xác định') + '</div>';
        return;
      }
      if (!data.days || data.days.length === 0) {
        document.getElementById('hist-content').innerHTML =
          '<div class="hist-loading">📭 Chưa có dữ liệu chấm công.<br><small style="color:#888;">Tháng ' + data.month + '/' + data.year + ' — ' + name + '</small></div>';
        document.getElementById('hist-month-label').textContent = 'Tháng ' + data.month + '/' + data.year;
        return;
      }
      renderHistory(data);
    })
    .catch(function(e){
      document.getElementById('hist-content').innerHTML =
        '<div class="hist-loading" style="color:#c5221f;">❌ Lỗi kết nối: ' + e.message + '<br><small>URL: ' + url.substring(0,60) + '...</small></div>';
    });
}

// Định dạng giờ cho bảng lịch sử
function fmtTime(t) {
  if (!t || t === '' || t === ':' || t === ': :' || t === '--:--') {
    return '<span style="color:#ccc;">: :</span>';
  }
  // Chỉ hiện HH:MM (bỏ giây)
  var s = t.toString().trim();
  return s.length >= 5 ? s.substring(0,5) : s;
}

function renderHistory(data) {
  var days        = data.days        || [];
  var todayStr    = data.todayStr    || '';
  var holidaysMap = data.holidaysMap || {};

  // Cập nhật label tháng
  document.getElementById('hist-month-label').textContent =
    'Tháng ' + data.month + '/' + data.year;

  // Lọc đến hôm nay
  var daysToShow = days.filter(function(d) {
    return compareDateClient(d.date, todayStr) <= 0;
  });

  // Thống kê
  document.getElementById('hist-summary').innerHTML =
    '<div class="hist-stat"><div class="val">'                        + (data.congChuan  ||0) + '</div><div class="lbl">Công chuẩn</div></div>' +
    '<div class="hist-stat"><div class="val" style="color:#137333;">' + (data.congThucTe ||0) + '</div><div class="lbl">Công T.tế</div></div>'  +
    '<div class="hist-stat"><div class="val" style="color:#b45309;">' + (data.congBD     ||0) + '</div><div class="lbl">Công B,D</div></div>'   +
    '<div class="hist-stat"><div class="val" style="color:#c5221f;">' + (data.khongCham  ||0) + '</div><div class="lbl">Không chấm</div></div>';

  if (daysToShow.length === 0) {
    document.getElementById('hist-content').innerHTML =
      '<div class="hist-loading">Chưa có dữ liệu.</div>';
    return;
  }

  var DOW_LABEL = ['CN','2','3','4','5','6','7'];

  function getDayOfWeek(dateStr) {
    var p = dateStr.split('/');
    return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0])).getDay();
  }

  function gradeSpan(g) {
    var cls = g==='A'?'grade-a':g==='B'?'grade-b':'grade-d';
    return '<span class="'+cls+'">'+g+'</span>';
  }

  var tableHtml = '<table class="hist-table"><thead><tr>'
    + '<th>Ngày</th><th>Thứ</th>'
    + '<th>Sáng IN</th><th>Sáng OUT</th>'
    + '<th>Chiều IN</th><th>Chiều OUT</th>'
    + '<th>Đánh giá</th><th>Lý do</th>'
    + '</tr></thead><tbody>';

  daysToShow.forEach(function(d) {
    var dow       = getDayOfWeek(d.date);
    var isWeekend = (dow === 0 || dow === 6);

    // Kiểm tra ngày lễ: từ holidaysMap hoặc từ cột Lý do trong sheet
    var isHoliday    = !!holidaysMap[d.date] || d.isHoliday === true;
    // Lấy nhãn lễ
    var holidayLabel = holidaysMap[d.date] || d.holidayLabel || '';
    // Fallback: nếu reasonRaw chứa "Nghỉ" và không có chấm công → coi là nghỉ lễ
    if (!isHoliday && d.hasAbsent) {
      var reasonLower = (d.reason || '').toLowerCase().replace(/\|+/g,'').trim();
      if (reasonLower.indexOf('nghỉ') !== -1 || reasonLower.indexOf('nghi') !== -1) {
        isHoliday    = true;
        holidayLabel = (d.reason || '').replace(/\|+/g,'').trim() || 'Nghỉ lễ';
      }
    }

    // Lý do: lấy từ dữ liệu, ẩn nếu chỉ là ||||
    var reasonRaw = (d.reason || '').trim();
    // Lọc bỏ ||| ở cuối (ví dụ "Nghỉ lễ||||" → "Nghỉ lễ")
    var reasonClean = reasonRaw.replace(/\|+$/, '').trim();
    // Nếu chỉ còn ||| hoặc rỗng → ẩn
    var reasonDisplay = (!reasonClean || /^\|+$/.test(reasonClean)) ? '' : reasonClean;

    // Ưu tiên label từ holidaysMap nếu có
    if (isHoliday && !reasonDisplay) reasonDisplay = holidayLabel;

    // Row class
    var rowClass = isHoliday  ? 'holiday'
      : isWeekend             ? 'weekend'
      : d.hasAbsent           ? 'absent'
      : d.allOk               ? 'all-ok'
      : 'partial';

    var noReasonClass = reasonDisplay === '' ? ' no-reason' : '';
    var dowStyle = isWeekend || isHoliday
      ? 'font-weight:700;' : 'color:#888;';
    var dowLabel = dow === 0 ? 'CN' : 'T' + DOW_LABEL[dow];

    tableHtml += '<tr class="' + rowClass + noReasonClass + '">'
      + '<td>' + d.date + '</td>'
      + '<td style="' + dowStyle + '">' + dowLabel + '</td>'
      + '<td>' + fmtTime(d.morningIn)    + '</td>'
      + '<td>' + fmtTime(d.morningOut)   + '</td>'
      + '<td>' + fmtTime(d.afternoonIn)  + '</td>'
      + '<td>' + fmtTime(d.afternoonOut) + '</td>'
      + '<td style="white-space:nowrap;">'
      + (isWeekend || isHoliday ? '' :
          gradeSpan(d.g1)+' '+gradeSpan(d.g2)+' '+gradeSpan(d.g3)+' '+gradeSpan(d.g4))
      + '</td>'
      + '<td>' + reasonDisplay + '</td>'
      + '</tr>';
  });

  tableHtml += '</tbody></table>';
  document.getElementById('hist-content').innerHTML = tableHtml;
}

// So sánh ngày dd/MM/yyyy phía client
function compareDateClient(a, b) {
  function n(s){ var p=s.split('/'); return parseInt(p[2])*10000+parseInt(p[1])*100+parseInt(p[0]); }
  var na=n(a), nb=n(b);
  return na<nb?-1:na>nb?1:0;
}

    .replace(/\/nv\/[^\/]+\.html$/, '')  // /nv/TenFile.html → bỏ cả /nv/TenFile.html
    .replace(/\/[^\/]+\.html$/, '');       // /index.html → bỏ file
  base = base.replace(/\/$/, '');
  window.open(base + '/huongdan.html', '_blank');
}
</script>
